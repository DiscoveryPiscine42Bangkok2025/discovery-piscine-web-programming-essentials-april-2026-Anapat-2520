<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> responsive.html</title>
<style>
    html body {
        height: 100%;
        margin: 0;
    }

    table {
        width: 100vw;
        height: 100vh;
        border-collapse: collapse;
        table-layout: fixed;
    }
    td {
        text-align: center;
        font-size: 10vw;
    }
    .m1 {background-color: green;}
    .m2 {background-color: red;}
</style>
</head>
<body>
    
<table border="1">
    <tr>
        <td class="m1">Correct</td>
        <td class="m2">Incorrect</td>
    </tr>
</table>

</body>
</html>
